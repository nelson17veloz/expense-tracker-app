<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <div class="background-overlay"></div>

  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Personal Finance</p>
          <h1>Expense Tracker</h1>
          <p class="hero-subtext">Track income and spending in one place.</p>
        </div>
      </div>

      <div class="balance-panel">
        <p class="balance-label">Current Balance</p>
        <h2 id="balance">$0.00</h2>
      </div>

      <div class="summary-grid">
        <div class="summary-box income-box">
          <span class="summary-title">Income</span>
          <strong>$<span id="income">0.00</span></strong>
        </div>

        <div class="summary-box expense-box">
          <span class="summary-title">Expenses</span>
          <strong>$<span id="expenses">0.00</span></strong>
        </div>
      </div>
    </section>

    <section class="card form-card">
      <div class="section-header">
        <h3>Add Transaction</h3>
      </div>

      <div class="input-group">
        <label for="desc">Description</label>
        <input
          type="text"
          id="desc"
          placeholder="Paycheck, Groceries, Gas..."
          maxlength="60"
        />
      </div>

      <div class="input-group">
        <label for="amount">Amount</label>
        <input
          type="number"
          id="amount"
          placeholder="0.00"
          inputmode="decimal"
          step="0.01"
        />
      </div>

      <div class="action-row">
        <button class="main-btn income-main-btn" onclick="addIncome()">
          Add Income
        </button>
        <button class="main-btn expense-main-btn" onclick="addExpense()">
          Add Expense
        </button>
      </div>
    </section>

    <section class="card list-card">
      <div class="section-header">
        <h3>Transactions</h3>
      </div>

      <ul id="list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
