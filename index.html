<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <div class="app">
    <div class="top-card">
      <div class="brand">
        <img src="Logo.PNG" alt="App Logo" class="Logo" />
        <div>
          <p class="mini-title">Personal Finance</p>
          <h1>Expense Tracker</h1>
        </div>
      </div>

      <div class="balance-card">
        <p class="balance-label">Current Balance</p>
        <h2 id="balance">$0.00</h2>
      </div>

      <div class="summary-grid">
        <div class="summary-box income-box">
          <p>Income</p>
          <h3>$<span id="income">0.00</span></h3>
        </div>
        <div class="summary-box expense-box">
          <p>Expenses</p>
          <h3>$<span id="expenses">0.00</span></h3>
        </div>
      </div>
    </div>

    <div class="form-card">
      <h3>Add Transaction</h3>

      <div class="input-group">
        <label for="desc">Description</label>
        <input type="text" id="desc" placeholder="Ex: Paycheck, Rent, Food" />
      </div>

      <div class="input-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal" />
      </div>

      <div class="action-row">
        <button class="income-main-btn" onclick="addIncome()">Add Income</button>
        <button class="expense-main-btn" onclick="addExpense()">Add Expense</button>
      </div>
    </div>

    <div class="list-card">
      <div class="list-header">
        <h3>Transactions</h3>
      </div>
      <ul id="list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
